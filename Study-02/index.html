<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의 할일</title>
  <style>
    /* ── 색상 변수 ── */
    :root {
      --color-work:    #3B82F6;
      --color-personal:#10B981;
      --color-study:   #8B5CF6;
      --color-bg:      #F9FAFB;
      --color-card:    #ffffff;
      --color-border:  #E5E7EB;
      --color-text:    #111827;
      --color-muted:   #6B7280;
      --radius:        12px;
    }

    /* ── 리셋 & 기본 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      padding: 24px 16px;
    }

    /* ── 레이아웃 래퍼 ── */
    .app {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── 공통 카드 ── */
    .card {
      background: var(--color-card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
    }

    /* ────────────────────────────
       1. 헤더
    ──────────────────────────── */
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .header__title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -.5px;
    }

    .header__date {
      font-size: .875rem;
      color: var(--color-muted);
    }

    /* ────────────────────────────
       2. 진행률
    ──────────────────────────── */
    .progress__track {
      height: 8px;
      background: var(--color-border);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .progress__fill {
      height: 100%;
      width: 0%;            /* JS에서 동적으로 변경 */
      background: linear-gradient(90deg, var(--color-work), var(--color-study));
      border-radius: 99px;
      transition: width .3s ease;
    }

    .progress__meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    .progress__category {
      font-size: .75rem;
      color: var(--color-muted);
    }

    .progress__label {
      font-size: .8125rem;
      color: var(--color-muted);
      white-space: nowrap;
    }

    /* ────────────────────────────
       3. 입력 영역
    ──────────────────────────── */
    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-row__text {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid var(--color-border);
      border-radius: 8px;
      font-size: .9375rem;
      outline: none;
      transition: border-color .2s;
    }

    .input-row__text:focus {
      border-color: var(--color-work);
    }

    .input-row__select {
      padding: 10px 10px;
      border: 1.5px solid var(--color-border);
      border-radius: 8px;
      font-size: .875rem;
      background: var(--color-card);
      cursor: pointer;
      outline: none;
    }

    .input-row__btn {
      padding: 10px 18px;
      background: var(--color-work);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .9375rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .15s;
    }

    .input-row__btn:hover { opacity: .88; }

    /* ────────────────────────────
       4. 필터 버튼
    ──────────────────────────── */
    .filter {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter__btn {
      padding: 7px 16px;
      border: 1.5px solid var(--color-border);
      border-radius: 99px;
      background: transparent;
      font-size: .8125rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--color-muted);
      transition: all .15s;
    }

    .filter__btn:hover {
      border-color: var(--color-work);
      color: var(--color-work);
    }

    .filter__btn.active {
      background: var(--color-work);
      border-color: var(--color-work);
      color: #fff;
    }

    /* ────────────────────────────
       5. 할일 목록
    ──────────────────────────── */
    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      /* 비어있을 때 최소 높이 (선택) */
      min-height: 40px;
    }

    /* 할일 아이템 (JS 단계에서 동적 생성 예정) */
    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--color-card);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
    }

    .todo-item__check {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      cursor: pointer;
      accent-color: var(--color-work);
    }

    .todo-item__text {
      flex: 1;
      font-size: .9375rem;
    }

    .todo-item__badge {
      font-size: .6875rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 99px;
      color: #fff;
    }

    .todo-item__badge--work    { background: var(--color-work); }
    .todo-item__badge--personal{ background: var(--color-personal); }
    .todo-item__badge--study   { background: var(--color-study); }

    .todo-item__delete {
      background: none;
      border: none;
      color: var(--color-muted);
      font-size: 1.1rem;
      cursor: pointer;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color .15s;
    }

    .todo-item__delete:hover { color: #EF4444; }

    /* 수정 버튼 */
    .todo-item__edit {
      background: none;
      border: none;
      color: var(--color-muted);
      font-size: 1rem;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color .15s;
    }

    .todo-item__edit:hover { color: var(--color-work); }

    /* 수정 모드 레이아웃 */
    .todo-item--editing { flex-wrap: wrap; }

    .todo-item__edit-input {
      flex: 1;
      min-width: 120px;
      padding: 6px 10px;
      border: 1.5px solid var(--color-work);
      border-radius: 6px;
      font-size: .9375rem;
      outline: none;
    }

    .todo-item__edit-select {
      padding: 6px 8px;
      border: 1.5px solid var(--color-border);
      border-radius: 6px;
      font-size: .875rem;
      background: var(--color-card);
      outline: none;
      cursor: pointer;
    }

    .todo-item__save {
      padding: 6px 12px;
      background: var(--color-work);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: .8125rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }

    .todo-item__save:hover { opacity: .88; }

    .todo-item__cancel {
      padding: 6px 10px;
      background: none;
      border: 1.5px solid var(--color-border);
      border-radius: 6px;
      font-size: .8125rem;
      color: var(--color-muted);
      cursor: pointer;
      transition: background .15s;
    }

    .todo-item__cancel:hover { background: var(--color-bg); }

    /* 완료 상태 */
    .completed .todo-item__text {
      text-decoration: line-through;
      color: var(--color-muted);
    }

    /* ────────────────────────────
       완료 항목 삭제 버튼
    ──────────────────────────── */
    .list-footer {
      display: flex;
      justify-content: flex-end;
    }

    .clear-btn {
      padding: 8px 16px;
      background: none;
      border: 1.5px solid #FCA5A5;
      border-radius: 8px;
      color: #EF4444;
      font-size: .8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, color .15s;
    }

    .clear-btn:hover:not(:disabled) {
      background: #EF4444;
      color: #fff;
    }

    .clear-btn:disabled {
      border-color: var(--color-border);
      color: var(--color-muted);
      cursor: not-allowed;
      opacity: .6;
    }

    /* 빈 상태 */
    .empty-state {
      text-align: center;
      padding: 40px 16px;
      color: var(--color-muted);
      font-size: .9375rem;
      background: var(--color-card);
      border-radius: var(--radius);
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
    }

    /* ── 모바일 ── */
    @media (max-width: 480px) {
      body { padding: 16px 12px; }
      .card { padding: 16px; }
      .input-row { flex-wrap: wrap; }
      .input-row__text { min-width: 0; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- 1. 헤더 -->
  <header class="card header">
    <h1 class="header__title">오늘의 할일</h1>
    <span class="header__date" id="today-date"></span>
  </header>

  <!-- 2. 진행률 -->
  <section class="card">
    <div class="progress__track">
      <div class="progress__fill" id="progress-fill"></div>
    </div>
    <div class="progress__meta">
      <p class="progress__category" id="progress-category"></p>
      <p class="progress__label" id="progress-label">전체 0개 중 0개 완료 (0%)</p>
    </div>
  </section>

  <!-- 3. 입력 영역 -->
  <section class="card">
    <div class="input-row">
      <input
        class="input-row__text"
        type="text"
        id="todo-input"
        placeholder="오늘 할 일을 입력하세요"
      />
      <select class="input-row__select" id="category-select">
        <option value="work">업무</option>
        <option value="personal">개인</option>
        <option value="study">공부</option>
      </select>
      <button class="input-row__btn" id="add-btn">추가</button>
    </div>
  </section>

  <!-- 4. 필터 -->
  <section class="card filter">
    <button class="filter__btn active" data-filter="all">전체</button>
    <button class="filter__btn" data-filter="work">업무</button>
    <button class="filter__btn" data-filter="personal">개인</button>
    <button class="filter__btn" data-filter="study">공부</button>
  </section>

  <!-- 5. 할일 목록 -->
  <ul class="todo-list" id="todo-list"></ul>

  <!-- 완료 항목 삭제 -->
  <div class="list-footer">
    <button class="clear-btn" id="clear-btn" disabled>완료 항목 삭제</button>
  </div>

</div>

<script>
  // ── 날짜 표시 ──────────────────────────────────────────
  document.getElementById('today-date').textContent = new Date().toLocaleDateString('ko-KR', {
    year: 'numeric', month: 'long', day: 'numeric', weekday: 'short'
  });

  // ── 상수 & 상태 ────────────────────────────────────────
  const STORAGE_KEY = 'todo-app-data';

  const CATEGORY_META = {
    work:     { label: '업무', badgeClass: 'todo-item__badge--work' },
    personal: { label: '개인', badgeClass: 'todo-item__badge--personal' },
    study:    { label: '공부', badgeClass: 'todo-item__badge--study' },
  };

  let todos         = [];
  let currentFilter = 'all';  // 'all' | 'work' | 'personal' | 'study'
  let editingId     = null;   // 수정 중인 todo id

  // ── localStorage ────────────────────────────────────────
  function saveTodos() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
  }

  function loadTodos() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      todos = raw ? JSON.parse(raw) : [];
    } catch {
      todos = [];
    }
  }

  // ── DOM 참조 ────────────────────────────────────────────
  const listEl             = document.getElementById('todo-list');
  const progressFill       = document.getElementById('progress-fill');
  const progressLabel      = document.getElementById('progress-label');
  const progressCategoryEl = document.getElementById('progress-category');
  const clearBtnEl         = document.getElementById('clear-btn');
  const filterBtns         = document.querySelectorAll('.filter__btn');

  // ── 렌더링 ──────────────────────────────────────────────
  function renderTodos() {
    // 필터 버튼 활성 상태 동기화
    filterBtns.forEach(btn =>
      btn.classList.toggle('active', btn.dataset.filter === currentFilter)
    );

    listEl.innerHTML = '';

    const visible = currentFilter === 'all'
      ? todos
      : todos.filter(t => t.category === currentFilter);

    if (visible.length === 0) {
      const empty = document.createElement('li');
      empty.className   = 'empty-state';
      empty.textContent = '할일을 추가해보세요! ✅';
      listEl.appendChild(empty);
    } else {
      visible.forEach(todo => {
        listEl.appendChild(
          editingId === todo.id ? buildEditItem(todo) : buildNormalItem(todo)
        );
      });
    }

    updateProgress();
  }

  function buildNormalItem(todo) {
    const meta = CATEGORY_META[todo.category];

    const li = document.createElement('li');
    li.className = 'todo-item' + (todo.completed ? ' completed' : '');
    li.dataset.id = todo.id;

    const checkbox = document.createElement('input');
    checkbox.type      = 'checkbox';
    checkbox.className = 'todo-item__check';
    checkbox.checked   = todo.completed;
    checkbox.addEventListener('change', () => toggleTodo(todo.id));

    const badge = document.createElement('span');
    badge.className   = 'todo-item__badge ' + meta.badgeClass;
    badge.textContent = meta.label;

    const textSpan = document.createElement('span');
    textSpan.className   = 'todo-item__text';
    textSpan.textContent = todo.text;

    const editBtn = document.createElement('button');
    editBtn.className = 'todo-item__edit';
    editBtn.textContent = '✎';
    editBtn.setAttribute('aria-label', '수정');
    editBtn.addEventListener('click', () => { editingId = todo.id; renderTodos(); });

    const deleteBtn = document.createElement('button');
    deleteBtn.className   = 'todo-item__delete';
    deleteBtn.textContent = '✕';
    deleteBtn.setAttribute('aria-label', '삭제');
    deleteBtn.addEventListener('click', () => deleteTodo(todo.id));

    li.append(checkbox, badge, textSpan, editBtn, deleteBtn);
    return li;
  }

  function buildEditItem(todo) {
    const li = document.createElement('li');
    li.className = 'todo-item todo-item--editing';
    li.dataset.id = todo.id;

    const checkbox = document.createElement('input');
    checkbox.type      = 'checkbox';
    checkbox.className = 'todo-item__check';
    checkbox.checked   = todo.completed;
    checkbox.addEventListener('change', () => toggleTodo(todo.id));

    const editSelect = document.createElement('select');
    editSelect.className = 'todo-item__edit-select';
    Object.entries(CATEGORY_META).forEach(([val, meta]) => {
      const opt = document.createElement('option');
      opt.value       = val;
      opt.textContent = meta.label;
      if (val === todo.category) opt.selected = true;
      editSelect.appendChild(opt);
    });

    const editInput = document.createElement('input');
    editInput.type      = 'text';
    editInput.className = 'todo-item__edit-input';
    editInput.value     = todo.text;
    editInput.addEventListener('keydown', e => {
      if (e.key === 'Enter')  saveEdit(todo.id, editInput.value, editSelect.value);
      if (e.key === 'Escape') { editingId = null; renderTodos(); }
    });

    const saveBtn = document.createElement('button');
    saveBtn.className   = 'todo-item__save';
    saveBtn.textContent = '저장';
    saveBtn.addEventListener('click', () => saveEdit(todo.id, editInput.value, editSelect.value));

    const cancelBtn = document.createElement('button');
    cancelBtn.className   = 'todo-item__cancel';
    cancelBtn.textContent = '취소';
    cancelBtn.addEventListener('click', () => { editingId = null; renderTodos(); });

    li.append(checkbox, editSelect, editInput, saveBtn, cancelBtn);

    // 렌더 직후 포커스
    setTimeout(() => { editInput.focus(); editInput.select(); }, 0);

    return li;
  }

  function updateProgress() {
    const total     = todos.length;
    const completed = todos.filter(t => t.completed).length;
    const pct       = total === 0 ? 0 : Math.round((completed / total) * 100);

    progressFill.style.width  = pct + '%';
    progressLabel.textContent = `전체 ${total}개 중 ${completed}개 완료`;
    clearBtnEl.disabled       = completed === 0;
  }

  // ── 할일 추가 ────────────────────────────────────────────
  const inputEl  = document.getElementById('todo-input');
  const selectEl = document.getElementById('category-select');

  function addTodo() {
    const text = inputEl.value.trim();
    if (!text) return;

    todos.push({
      id:        Date.now().toString(),
      text,
      category:  selectEl.value,
      completed: false,
      createdAt: new Date().toISOString(),
    });

    saveTodos();
    renderTodos();
    inputEl.value = '';
    inputEl.focus();
  }

  document.getElementById('add-btn').addEventListener('click', addTodo);
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

  // ── 완료 토글 ────────────────────────────────────────────
  function toggleTodo(id) {
    const todo = todos.find(t => t.id === id);
    if (todo) todo.completed = !todo.completed;
    saveTodos();
    renderTodos();
  }

  // ── 삭제 ─────────────────────────────────────────────────
  function deleteTodo(id) {
    if (editingId === id) editingId = null;
    todos = todos.filter(t => t.id !== id);
    saveTodos();
    renderTodos();
  }

  // ── 완료 항목 전체 삭제 ──────────────────────────────────
  function clearCompleted() {
    if (editingId && todos.find(t => t.id === editingId)?.completed) editingId = null;
    todos = todos.filter(t => !t.completed);
    saveTodos();
    renderTodos();
  }

  clearBtnEl.addEventListener('click', clearCompleted);

  // ── 인라인 수정 저장 ─────────────────────────────────────
  function saveEdit(id, newText, newCategory) {
    const text = newText.trim();
    if (!text) return;

    const todo = todos.find(t => t.id === id);
    if (todo) {
      todo.text     = text;
      todo.category = newCategory;
    }
    editingId = null;
    saveTodos();
    renderTodos();
  }

  // ── 필터 버튼 ────────────────────────────────────────────
  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      currentFilter = btn.dataset.filter;
      renderTodos();
    });
  });

  // ── 초기화 ───────────────────────────────────────────────
  loadTodos();
  renderTodos();
</script>

</body>
</html>
